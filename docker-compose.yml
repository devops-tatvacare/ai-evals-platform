x-backend-common: &backend-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  environment:
    DATABASE_URL: postgresql+asyncpg://evals_user:evals_pass@postgres:5432/ai_evals_platform
    FILE_STORAGE_TYPE: local
    FILE_STORAGE_PATH: /app/uploads
    API_PORT: 8721
    CORS_ORIGINS: http://localhost:5173
    JOB_RUN_EMBEDDED_WORKER: "false"
    PYTHONUNBUFFERED: "1"
    # Silence "OPENAI_API_KEY is not set, skipping trace export" from the
    # OpenAI Agents SDK tracing subsystem. Read once in provider.py; the
    # SDK reports no-op tracing when disabled. Remove if/when we want to
    # export traces to OpenAI.
    OPENAI_AGENTS_DISABLE_TRACING: "1"
    # Orchestration integrations (optional — absent vars don't break boot)
    WATI_BASE_URL: ${WATI_BASE_URL:-}
    WATI_TENANT_ID: ${WATI_TENANT_ID:-}
    WATI_API_TOKEN: ${WATI_API_TOKEN:-}
    WATI_WEBHOOK_SECRET: ${WATI_WEBHOOK_SECRET:-}
    BOLNA_BASE_URL: ${BOLNA_BASE_URL:-https://api.bolna.ai}
    BOLNA_API_KEY: ${BOLNA_API_KEY:-}
    BOLNA_WEBHOOK_SECRET: ${BOLNA_WEBHOOK_SECRET:-}
    BOLNA_FROM_PHONE: ${BOLNA_FROM_PHONE:-}
    SMS_PROVIDER: ${SMS_PROVIDER:-}
    SMS_API_KEY: ${SMS_API_KEY:-}
    SMS_BASE_URL: ${SMS_BASE_URL:-}
  env_file:
    - .env.backend
  volumes:
    - ./backend/app:/app/app # hot-reload: Python source
    - backend-uploads:/app/uploads # persist uploaded files
    - ./service-account.json:/app/service-account.json:ro # Gemini service account
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    container_name: evals-postgres
    environment:
      POSTGRES_USER: evals_user
      POSTGRES_PASSWORD: evals_pass
      POSTGRES_DB: ai_evals_platform
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evals_user -d ai_evals_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    <<: *backend-common
    container_name: evals-backend
    ports:
      - "8721:8721"

  worker:
    <<: *backend-common
    container_name: evals-worker
    command: ["python", "-m", "app.worker"]

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: evals-frontend
    ports:
      - "5173:5173"
    environment:
      API_PROXY_TARGET: http://backend:8721
    volumes:
      - ./src:/app/src # hot-reload: React source
      - ./public:/app/public # hot-reload: static assets
      - ./index.html:/app/index.html # hot-reload: entry HTML
    depends_on:
      - backend

volumes:
  pgdata:
  backend-uploads:
