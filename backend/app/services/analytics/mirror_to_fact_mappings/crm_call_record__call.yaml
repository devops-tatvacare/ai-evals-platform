# Mirror -> fact projection for inside-sales call activities.
# Post-Phase-1 column names: lead_id (was prospect_id), rep_* (was agent_*).
# Loaded by ``MirrorToFactMapper``; consumed in Phase 3 by sync and Phase 4
# by backfill. See docs/plans/2026-05-12-analytics-facts-canonical-manifest-thinning.md §4.

source_table: analytics.crm_call_record
target_fact:  analytics.fact_lead_activity
app_id: inside-sales
activity_type: call
activity_subtype_from: direction          # "inbound" / "outbound"

structural_mapping:
  lead_id:             lead_id
  source_activity_id:  activity_id
  source_event_code:   event_code
  occurred_at:         call_started_at
  actor_type:          "'rep'"            # literal
  actor_id:            rep_id
  actor_label:         rep_name

attributes_mapping:
  duration_seconds:  duration_seconds
  direction:         direction
  status:            status
  phone_number:      phone_number
  recording_url:     recording_url
  rep_email:         rep_email
  has_recording:     has_recording
  call_notes:        call_notes
  event_code:        event_code
  call_session_id:   call_session_id
  display_number:    display_number

required_attributes: [duration_seconds, direction, status, rep_email]
