# backend/app/services/chat_engine/manifests/inside-sales.yaml
app_id: inside-sales
description: |
  Inside-sales analytics — lead-qualification calls, agent behaviors, thread evaluations.
  Uses analytics_*_facts for run/eval/criterion aggregates; evaluation_runs for run identity;
  evaluation_run_thread_results surface for per-call forensic lookups.

catalog_tables:
  agg_evaluation_run:
    pg_schema: analytics
    layer: analytics_aggregate
    grain: run
    orm: AggEvaluationRun
    alias: rf
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      run_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["run", "run id", "evaluation run"]
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      user_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["voice-rx", "kaira-bot", "inside-sales"]
      eval_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["batch_thread", "call_quality", "batch_adversarial", "custom", "full_evaluation", "inside_sales"]
        synonyms: ["evaluation type", "run type", "test type"]
      status:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["pending", "running", "completed", "completed_with_errors", "failed"]
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
      completed_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
      duration_ms:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: duration
        unit: ms
        measure_kind: duration_ms
      thread_count:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
        measure_kind: count
      pass_count:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
        measure_kind: count
      fail_count:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
        measure_kind: count
      error_count:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
        measure_kind: count
      pass_rate:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: percent
        unit: percent
        measure_kind: percent
        description: "0-100 percentage"
      avg_intent_accuracy:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: ratio
        measure_kind: ratio
        description: "0.0-1.0"
      adversarial_total:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
        nullable: true
        measure_kind: count
      adversarial_blocked:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
        nullable: true
        measure_kind: count
      adversarial_block_rate:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: percent
        nullable: true
        unit: percent
        measure_kind: percent
      avg_score:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: score
        nullable: true
        measure_kind: score
      run_name:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        description: "User-given run name when present"
      context:
        role: dimension
        type: jsonb
        data_type: nominal
        description: "App-specific metadata"
  fact_evaluation:
    pg_schema: analytics
    layer: analytics_fact
    grain: evaluation
    orm: FactEvaluation
    alias: ef
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      run_id:
