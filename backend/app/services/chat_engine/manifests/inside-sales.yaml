        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      eval_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      item_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["thread id", "case id"]
      item_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["thread", "adversarial_case", "recording", "listing"]
      evaluator_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      evaluator_name:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      evaluator_id:
        role: identifier
        type: uuid
        data_type: nominal
