data_surfaces:
  - key: runs
    description: 'Raw evaluation run records with status, timing, and run metadata.'
    backed_by: evaluation_runs
    entity_types: [run_id, run_name]
    entity_field_map:
      run_id: run_id
      run_name: run_name
    fields: [run_id, run_name, eval_type, status, created_at, error_message]
    default_limit: 10
  - key: logs
    description: 'Provider/API logs captured for call-evaluation runs.'
    backed_by: evaluation_run_api_call_logs
    entity_types: [run_id, thread_id]
    entity_field_map:
      run_id: run_id
      thread_id: thread_id
    fields: [run_id, thread_id, provider, model, method, prompt, response, error, created_at]
    default_limit: 12
  - key: thread_evaluations
    description: 'Call-level evaluation artifacts and nested coaching evidence.'
    backed_by: evaluation_run_thread_results
    entity_types: [run_id, item_id, thread_id]
    entity_field_map:
      run_id: run_id
      item_id: thread_id
      thread_id: thread_id
    fields: [run_id, thread_id, worst_correctness, efficiency_verdict, intent_accuracy, success_status, result, created_at]
    default_limit: 10
  - key: leads
    description: 'Roster of leads with lifecycle pointers (latest stage, first observation).'
    backed_by: dim_lead
    entity_types: [lead_id]
    entity_field_map:
      lead_id: lead_id
    fields: [lead_id, source, lsq_created_on, first_seen_at, latest_stage_observed, latest_stage_observed_at]
