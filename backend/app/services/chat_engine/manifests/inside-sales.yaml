      criterion_label:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        synonyms: ["rule", "rule name", "criterion"]
      evaluator_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      status:
        role: ordered_categorical
        type: text
        data_type: ordinal
        semantic_type: category
        allowed_values: ["FOLLOWED", "VIOLATED", "NOT_APPLICABLE", "NOT_EVALUATED"]
      passed:
        role: dimension
        type: boolean
        data_type: boolean
      evidence:
        role: dimension
        type: text
        data_type: nominal
        synonyms: ["reason", "rationale"]
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
  evaluation_runs:
    orm: EvaluationRun
    pg_schema: platform
    layer: transactional
    grain: run
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      user_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      eval_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      status:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
      started_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
      completed_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
      duration_ms:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: duration
        unit: ms
        nullable: true
        measure_kind: duration_ms
      evaluator_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: fk
        nullable: true
        description: "FK to platform.evaluators(id)"
      job_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: fk
        nullable: true
      listing_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: fk
        nullable: true
      session_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: fk
        nullable: true
      llm_provider:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      llm_model:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      summary:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
      error_message:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
      config:
        role: dimension
        type: jsonb
        data_type: nominal
        nullable: true
      result:
        role: dimension
        type: jsonb
        data_type: nominal
        nullable: true
      visibility:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
  evaluators:
    orm: Evaluator
    pg_schema: platform
    layer: identity
    grain: evaluator
    alias: e
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      user_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      name:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
      visibility:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
  # CRM mirror tables (`crm_call_record`, `crm_lead_record`) are hidden
  # from this Sherlock-visible catalog by design. The mirrors still exist
  # physically and back the sync pipeline + CRM workspace pages, but
  # Sherlock generates SQL only against the fact + dim surface below.
  # The supervisor prompt's hidden-mirror recovery rule translates user
  # mentions of `crm_call_record` → `fact_lead_activity` and
  # `crm_lead_record` → `dim_lead`, and acknowledges the swap in its
  # answer so the user can correct future prompts.
  dim_lead:
    pg_schema: analytics
    layer: identity
    grain: lead
    orm: DimLead
    alias: dl
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["inside-sales"]
      lead_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["prospect", "prospect id", "lead", "contact"]
      source:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      source_ref:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
      lsq_created_on:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
        synonyms: ["lead created", "created on (LSQ)"]
      first_seen_at:
        role: temporal
        type: timestamptz
        data_type: temporal
      latest_stage_observed:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        synonyms: ["current stage", "latest stage"]
      latest_stage_observed_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
      attributes_at_first_seen:
        role: dimension
        type: jsonb
        data_type: nominal
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
      updated_at:
        role: temporal
        type: timestamptz
        data_type: temporal
  fact_lead_stage_transition:
    pg_schema: analytics
    layer: analytics_fact
    grain: stage_transition
    orm: FactLeadStageTransition
    alias: lst
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      lead_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["prospect", "prospect id", "lead", "contact"]
      from_stage:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
      to_stage:
        role: dimension
        type: text
        data_type: nominal
        synonyms: ["current stage", "new stage"]
      detected_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        description: "observation time; real transition happened at or before this timestamp, bounded by the prior detection."
      transition_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
        description: "reserved for future webhook-derived rows; always NULL in v1."
      sync_run_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
        nullable: true
      attributes:
        role: dimension
        type: jsonb
        data_type: nominal
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
    # Stage transitions carry no per-to_stage payload today; `_default`
    # reserves the attribute_schemas surface for future per-to_stage
    # transition payloads (e.g. churn_reason on the Lost stage).
    attribute_schemas:
      _default: {}
  fact_lead_activity:
    pg_schema: analytics
    layer: analytics_fact
    grain: lead_activity
    orm: FactLeadActivity
    alias: la
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      lead_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["prospect", "prospect id", "lead", "contact"]
      source_activity_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["LSQ activity id", "activity id"]
      activity_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["call", "email", "web", "sms", "form_submit", "custom", "revenue"]
      activity_subtype:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        allowed_values: ["inbound_call", "outbound_call"]
      source_event_code:
        role: dimension
        type: int
        data_type: nominal
        nullable: true
        description: "raw LSQ ActivityEvent numeric code"
      occurred_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        synonyms: ["activity time", "happened at"]
      actor_type:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        # Phase 1 (Alembic 0038) canonicalized human-actor type to ``rep``;
        # ``agent`` retained for legacy rows during the soak.
        allowed_values: ["rep", "agent", "lead", "system"]
      actor_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        nullable: true
        synonyms: ["agent", "agent id", "salesperson", "rep", "caller"]
      actor_label:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        synonyms: ["agent", "agent id", "agent name", "rep", "rep name", "salesperson", "caller"]
      attributes:
        role: dimension
        type: jsonb
        data_type: nominal
      sync_run_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
        nullable: true
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
    attribute_schemas:
      call:
        duration_seconds:
          data_type: quantitative
          semantic_type: duration
          unit: seconds
          description: "Call duration in seconds; mirrors the typed mirror column."
        direction:
          data_type: nominal
          semantic_type: category
          allowed_values: ["inbound", "outbound"]
        status:
          data_type: nominal
          semantic_type: category
          allowed_values: ["answered", "no_answer", "busy", "rejected", "voicemail"]
        phone_number:
          data_type: nominal
          semantic_type: id_hash
          pii: true
        recording_url:
          data_type: nominal
          semantic_type: none
        rep_email:
          data_type: nominal
          semantic_type: id_hash
          synonyms: ["rep email", "sales rep email"]
        has_recording:
          data_type: boolean
          semantic_type: category
        call_notes:
          data_type: nominal
          semantic_type: none
          pii: true
        event_code:
          data_type: nominal
          semantic_type: category
          description: "Raw LSQ ActivityEvent code; also surfaced structurally as source_event_code."
        call_session_id:
          data_type: nominal
          semantic_type: id_hash
        display_number:
          data_type: nominal
          semantic_type: id_hash
          pii: true
  fact_lead_signal:
    pg_schema: analytics
    layer: analytics_fact
    grain: lead_signal
    orm: FactLeadSignal
    alias: ls
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      eval_run_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
        synonyms: ["run id", "evaluation run"]
      thread_evaluation_id:
        role: identifier
        type: int
        data_type: nominal
        semantic_type: id_hash
      lead_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        nullable: true
        synonyms: ["prospect", "prospect id", "lead", "contact"]
      source_activity_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
        nullable: true
      signal_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        synonyms: ["signal", "kind"]
      signal_value:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        synonyms: ["value"]
      signal_value_numeric:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: score
        nullable: true
        measure_kind: score
      signal_at:
        role: temporal
        type: timestamptz
        data_type: temporal
        nullable: true
        synonyms: ["committed at", "expected at"]
      confidence:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: ratio
        nullable: true
        measure_kind: ratio
        description: "0..1 LLM-extraction confidence"
      supporting_quote:
        role: dimension
        type: text
        data_type: nominal
        nullable: true
        synonyms: ["quote", "evidence"]
      ordinal:
        role: dimension
        type: int
        data_type: nominal
      attributes:
        role: dimension
        type: jsonb
        data_type: nominal
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
    # No declared JSONB keys today: the LLM-extracted signal payload is
    # carried structurally on signal_value / signal_value_numeric /
    # confidence / supporting_quote columns. `_default` reserves the
    # attribute_schemas surface for future signal_type-specific keys.
    attribute_schemas:
      _default: {}

data_surfaces:
  - key: runs
    description: 'Raw evaluation run records with status, timing, and run metadata.'
    backed_by: evaluation_runs
    entity_types: [run_id, run_name]
    entity_field_map:
      run_id: run_id
      run_name: run_name
    fields: [run_id, run_name, eval_type, status, created_at, error_message]
    default_limit: 10
  - key: logs
    description: 'Provider/API logs captured for call-evaluation runs.'
    backed_by: evaluation_run_api_call_logs
    entity_types: [run_id, thread_id]
    entity_field_map:
      run_id: run_id
      thread_id: thread_id
    fields: [run_id, thread_id, provider, model, method, prompt, response, error, created_at]
    default_limit: 12
  - key: thread_evaluations
    description: 'Call-level evaluation artifacts and nested coaching evidence.'
    backed_by: evaluation_run_thread_results
    entity_types: [run_id, item_id, thread_id]
    entity_field_map:
      run_id: run_id
      item_id: thread_id
      thread_id: thread_id
    fields: [run_id, thread_id, worst_correctness, efficiency_verdict, intent_accuracy, success_status, result, created_at]
    default_limit: 10
  - key: leads
    description: 'Roster of leads with lifecycle pointers (latest stage, first observation).'
    backed_by: dim_lead
    entity_types: [lead_id]
    entity_field_map:
      lead_id: lead_id
    fields: [lead_id, source, lsq_created_on, first_seen_at, latest_stage_observed, latest_stage_observed_at]
    default_limit: 25
  - key: lead_stage_transitions
    description: 'Append-only history of lead stage changes detected by the leads sync.'
    backed_by: fact_lead_stage_transition
    entity_types: [lead_id]
    entity_field_map:
      lead_id: lead_id
    fields: [lead_id, from_stage, to_stage, detected_at, sync_run_id]
    default_limit: 25
  - key: lead_activities
    description: 'Lead activities (calls, emails, web events, etc.) at activity grain.'
    backed_by: fact_lead_activity
    entity_types: [lead_id, source_activity_id]
    entity_field_map:
      lead_id: lead_id
      source_activity_id: source_activity_id
    fields: [lead_id, source_activity_id, activity_type, activity_subtype, occurred_at, actor_type]
    default_limit: 25
  - key: lead_signals
    description: 'LLM-extracted coaching signals from inside-sales call evaluations.'
    backed_by: fact_lead_signal
    entity_types: [eval_run_id, lead_id, signal_type]
    entity_field_map:
      eval_run_id: eval_run_id
      lead_id: lead_id
      signal_type: signal_type
    fields: [eval_run_id, thread_evaluation_id, lead_id, signal_type, signal_value, signal_at, confidence, supporting_quote]
    default_limit: 25

# Every lead-grain fact joins back to dim_lead via lead_id. The boot
# validator's cardinality audit confirms each relation is truly many-to-one
# (every fact row has exactly one matching dim_lead row; orphans fail boot).
relationships:
  - left_table: fact_lead_activity
    left_column: lead_id
    right_table: dim_lead
    right_column: lead_id
    relationship_type: many_to_one
  - left_table: fact_lead_signal
    left_column: lead_id
    right_table: dim_lead
    right_column: lead_id
    relationship_type: many_to_one
  - left_table: fact_lead_stage_transition
    left_column: lead_id
    right_table: dim_lead
    right_column: lead_id
    relationship_type: many_to_one
