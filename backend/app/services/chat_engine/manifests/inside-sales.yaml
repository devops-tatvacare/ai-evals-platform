        nullable: true
        description: "FK to platform.evaluators(id); NULL for system-built-in evaluators."
      result_verdict:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      result_status:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        synonyms: ["verdict"]
        ordering: ["PASS", "SOFT FAIL", "HARD FAIL"]
      result_score:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: score
        nullable: true
        measure_kind: score
      success:
        role: dimension
        type: boolean
        data_type: boolean
        nullable: true
      agent:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      direction:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        allowed_values: ["inbound", "outbound"]
      duration_seconds:
        role: measure
        type: float
        data_type: quantitative
        semantic_type: duration
        nullable: true
        unit: seconds
        measure_kind: duration_s
      intent:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      route:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
      query_type:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        nullable: true
        allowed_values: ["logging", "question"]
      difficulty:
        role: ordered_categorical
        type: text
        data_type: ordinal
        semantic_type: category
        nullable: true
        allowed_values: ["EASY", "MEDIUM", "HARD", "CRACK", "MORIARTY"]
      total_turns:
        role: measure
        type: int
        data_type: quantitative
        semantic_type: count
        nullable: true
        measure_kind: count
      result_detail:
        role: dimension
        type: jsonb
        data_type: nominal
        nullable: true
      context:
        role: dimension
        type: jsonb
        data_type: nominal
      created_at:
        role: temporal
        type: timestamptz
        data_type: temporal
  fact_evaluation_criterion:
    pg_schema: analytics
    layer: analytics_fact
    grain: criterion
    orm: FactEvaluationCriterion
    alias: cf
    columns:
      id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: pk
      run_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      app_id:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
      tenant_id:
        role: identifier
        type: uuid
        data_type: nominal
        semantic_type: id_hash
      item_id:
        role: identifier
        type: text
        data_type: nominal
        semantic_type: id_hash
      criterion_source:
        role: dimension
        type: text
        data_type: nominal
        semantic_type: category
        allowed_values: ["rule_catalog", "adversarial_rule", "custom_criterion"]
      criterion_id:
        role: identifier
        type: text
