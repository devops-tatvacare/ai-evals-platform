version: "3.0"

tables:
  analytics_run_facts:
    context_keys:
      run_name: { description: "Upload or batch name for the transcription run" }
  analytics_eval_facts:
    context_keys:
      segment_id: { description: "Segment identifier for the transcript slice" }
      speaker: { description: "Detected speaker label for the segment" }

dimensions:
  - name: run_name
    table: analytics_run_facts
    expression: "context->>'run_name'"
    description: "User-given run name"
  - name: eval_type
    table: analytics_run_facts
    expression: "eval_type"
    description: "Type of transcription or evaluation run"
  - name: evaluator_type
    table: analytics_eval_facts
    expression: "evaluator_type"
    description: "Evaluation or critique type"
  - name: evaluator_name
    table: analytics_eval_facts
    expression: "evaluator_name"
    description: "Human-readable evaluator name"
  - name: result_status
    table: analytics_eval_facts
    expression: "result_status"
    description: "Segment or run status"
  - name: rule
    table: analytics_criterion_facts
    expression: "criterion_label"
    description: "Rule or criterion label"
  - name: criterion_source
    table: analytics_criterion_facts
    expression: "criterion_source"
    description: "Source of the criterion"
