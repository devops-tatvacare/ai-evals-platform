version: "3.0"

tables:
  analytics_run_facts:
    context_keys:
      run_name: { description: "Name for the scoring batch" }
  analytics_eval_facts:
    context_keys:
      agent: { description: "Agent or caller associated with the interaction" }
      direction: { description: "Call direction: inbound or outbound" }
      duration: { description: "Call duration in seconds" }
      prospect_id: { description: "Prospect identifier tied to the interaction" }
      event_code: { description: "Telephony or workflow event code" }

dimensions:
  - name: run_name
    table: analytics_run_facts
    expression: "context->>'run_name'"
    description: "User-given run name"
  - name: eval_type
    table: analytics_run_facts
    expression: "eval_type"
    description: "Type of scoring run"
  - name: agent
    table: analytics_eval_facts
    expression: "context->>'agent'"
    description: "Human agent or bot tied to the interaction"
  - name: direction
    table: analytics_eval_facts
    expression: "context->>'direction'"
    description: "Inbound or outbound interaction direction"
  - name: evaluator_type
    table: analytics_eval_facts
    expression: "evaluator_type"
    description: "Evaluation or rubric type"
  - name: evaluator_name
    table: analytics_eval_facts
    expression: "evaluator_name"
    description: "Human-readable evaluator name"
  - name: result_status
    table: analytics_eval_facts
    expression: "result_status"
    description: "Primary verdict or outcome"
  - name: rule
    table: analytics_criterion_facts
    expression: "criterion_label"
    description: "Rule or criterion label"
