##
## Semantic model for the evaluation analytics platform.
## Loaded by the SQL agent to generate queries from natural language.
## Update this file when the schema changes.
##
version: "3.0"
description: >
  Evaluation analytics platform with pre-computed fact tables.
  Use analytics_run_facts, analytics_eval_facts, and analytics_criterion_facts
  for all analytical queries. These contain pre-extracted, indexed data.

tables:

  analytics_run_facts:
    alias: rf
    description: >
      Pre-computed run-level metrics. One row per eval run.
      Use this for run trends, pass rates over time, run comparisons.
    primary_key: id
    columns:
      id: { type: uuid }
      run_id: { type: uuid, description: "References eval_runs.id" }
      app_id: { type: text }
      eval_type: { type: text, description: "batch_thread, call_quality, batch_adversarial, full_evaluation, custom" }
      status: { type: text, description: "completed, completed_with_errors, failed" }
      created_at: { type: timestamptz }
      completed_at: { type: timestamptz }
      duration_ms: { type: float }
      thread_count: { type: int, description: "Number of items evaluated" }
      pass_count: { type: int }
      fail_count: { type: int }
      error_count: { type: int }
      pass_rate: { type: float, description: "0-100 percentage" }
      avg_intent_accuracy: { type: float, description: "0.0-1.0" }
      adversarial_total: { type: int, nullable: true }
      adversarial_blocked: { type: int, nullable: true }
      adversarial_block_rate: { type: float, nullable: true, description: "0-100 percentage" }
      run_name: { type: text, nullable: true, role: dimension, description: "User-given run name when present" }
      avg_score: { type: float, nullable: true, role: measure, unit: score, pre_aggregated: true, description: "Average call-quality rubric score for the run" }
      context: { type: jsonb, description: "App-specific metadata. Flat key-value, e.g. context->>'run_name'" }
    context_keys:
      run_name: { description: "User-given run name" }
    access_control:
      tenant_column: tenant_id

  analytics_eval_facts:
    alias: ef
    description: >
      Per-evaluator per-item results. One row per evaluator per thread/case.
      Unifies built-in verdicts, custom scores, rubric scores, adversarial results.
      Use this for evaluator-level analysis, score distributions, evaluator comparisons.
    primary_key: id
    columns:
      id: { type: uuid }
      run_id: { type: uuid }
      app_id: { type: text }
      eval_type: { type: text }
      item_id: { type: text, description: "Thread ID, adversarial case ID, or listing ID" }
      item_type: { type: text, description: "thread, adversarial_case, recording, listing" }
      evaluator_type: { type: text, description: "intent, correctness, efficiency, custom, call_rubric, adversarial_judge, critique" }
      evaluator_name: { type: text, description: "Human-readable evaluator name" }
      evaluator_id: { type: uuid, nullable: true, description: "FK to evaluators table for custom evaluators" }
      result_status: { type: text, nullable: true, description: "PASS, FAIL, HARD FAIL, SOFT FAIL, CRITICAL, EFFICIENT, FRICTION, etc." }
      result_score: { type: float, nullable: true, description: "Numeric score if applicable" }
      result_verdict: { type: text, nullable: true }
      success: { type: boolean, nullable: true, description: "Did this evaluation pass?" }
      agent: { type: text, nullable: true, role: dimension, description: "Primary human or bot agent associated with the evaluation item" }
      direction: { type: text, nullable: true, role: dimension, allowed_values: ["inbound", "outbound"], description: "Interaction direction" }
      duration_seconds: { type: float, nullable: true, role: measure, unit: seconds, description: "Interaction duration in seconds" }
      intent: { type: text, nullable: true, role: dimension, description: "Primary intent label for the item" }
      route: { type: text, nullable: true, role: dimension, description: "Primary routed or predicted handling path" }
      query_type: { type: text, nullable: true, role: dimension, allowed_values: ["logging", "question"], description: "Intent/query mode" }
      difficulty: { type: text, nullable: true, role: dimension, allowed_values: ["EASY", "MEDIUM", "HARD", "CRACK"], description: "Adversarial difficulty" }
      total_turns: { type: int, nullable: true, role: measure, unit: count, description: "Number of turns in the interaction" }
      result_detail: { type: jsonb, nullable: true, description: "Structured evaluation payload for the row" }
      context: { type: jsonb, description: "App-specific metadata, e.g. context->>'agent' for call quality" }
      created_at: { type: timestamptz }
    context_keys:
      agent: { description: "Agent or bot associated with the evaluation item" }
      direction: { description: "Inbound or outbound interaction direction" }
      difficulty: { description: "Difficulty or severity label" }
    joins: "ef.run_id = rf.run_id"
    access_control:
      tenant_column: tenant_id

  analytics_criterion_facts:
    alias: cf
    description: >
      Per-rule per-item results. One row per criterion (rule/check) per thread.
      Answers 'which rules fail most?', 'compliance rate by rule', 'co-failing rules'.
      No JSONB unpacking needed — rules are pre-extracted into flat rows.
    primary_key: id
    columns:
      id: { type: uuid }
      run_id: { type: uuid }
      app_id: { type: text }
      item_id: { type: text, description: "Thread ID or adversarial case ID" }
      criterion_source: { type: text, description: "rule_catalog, adversarial_rule, custom_criterion" }
      criterion_id: { type: text, description: "Rule identifier, e.g. exact_calorie_values" }
      criterion_label: { type: text, nullable: true, description: "Human-readable label (section name)" }
      evaluator_type: { type: text, description: "correctness, efficiency, adversarial_judge" }
      status: { type: text, description: "FOLLOWED, VIOLATED, NOT_APPLICABLE, NOT_EVALUATED" }
      passed: { type: boolean, nullable: true, description: "true=FOLLOWED, false=VIOLATED, null=N/A" }
      evidence: { type: text, nullable: true, description: "Why this status was assigned (truncated to 500 chars)" }
      created_at: { type: timestamptz }
    joins: "cf.run_id = rf.run_id"
    access_control:
      tenant_column: tenant_id

  eval_runs:
    alias: e
    description: >
      Original eval run records. Use for fields not in fact tables:
      batch_metadata, config, llm_provider, llm_model.
      For analytics queries, prefer analytics_run_facts.
    primary_key: id
    columns:
      id: { type: uuid }
      app_id: { type: text }
      eval_type: { type: text }
      status: { type: text }
      created_at: { type: timestamptz }
      completed_at: { type: timestamptz }
      duration_ms: { type: float }
      llm_provider: { type: text }
      llm_model: { type: text }
      "batch_metadata->>'name'": { type: text, description: "User-given run name" }
    access_control:
      tenant_column: tenant_id
      user_column: user_id
      visibility_column: visibility
      app_column: app_id

dimensions:
  - name: run_id
    table: analytics_run_facts
    expression: "run_id::text"
    description: "Canonical evaluation run identifier"
  - name: run_name
    table: analytics_run_facts
    expression: "run_name"
    description: "User-given run name"
  - name: eval_type
    table: analytics_run_facts
    expression: "eval_type"
    description: "Type of run or evaluation"
  - name: run_status
    table: analytics_run_facts
    expression: "status"
    description: "Lifecycle status of the evaluation run"
  - name: evaluator_type
    table: analytics_eval_facts
    expression: "evaluator_type"
    description: "Evaluator family or mode"
  - name: evaluator_name
    table: analytics_eval_facts
    expression: "evaluator_name"
    description: "Human-readable evaluator name"
  - name: result_status
    table: analytics_eval_facts
    expression: "result_status"
    description: "Primary status or verdict"
  - name: item_id
    table: analytics_eval_facts
    expression: "item_id"
    description: "Canonical evaluated item identifier"
  - name: item_type
    table: analytics_eval_facts
    expression: "item_type"
    description: "Kind of evaluated item"
  - name: rule
    table: analytics_criterion_facts
    expression: "criterion_label"
    description: "Rule or criterion label"
  - name: criterion_source
    table: analytics_criterion_facts
    expression: "criterion_source"
    description: "Where the rule or criterion came from"

metrics:
  pass_rate:
    description: "Percentage of items that passed (from run facts)"
    sql: "rf.pass_rate"
    applies_to: analytics_run_facts

  avg_intent_accuracy:
    description: "Average intent accuracy across runs"
    sql: "ROUND(AVG(rf.avg_intent_accuracy)::numeric, 3)"
    applies_to: analytics_run_facts

  adversarial_block_rate:
    description: "Percentage of adversarial attacks blocked"
    sql: "rf.adversarial_block_rate"
    applies_to: analytics_run_facts

  rule_compliance_rate:
    description: "Per-rule: FOLLOWED / (FOLLOWED + VIOLATED)"
    sql: |
      ROUND(
        COUNT(*) FILTER (WHERE cf.status = 'FOLLOWED') * 100.0 /
        NULLIF(COUNT(*) FILTER (WHERE cf.status IN ('FOLLOWED', 'VIOLATED')), 0),
      1)
    applies_to: analytics_criterion_facts

common_queries:
  - intent: "Which rules are most violated?"
    sql: |
      SELECT cf.criterion_id AS rule_id,
             cf.criterion_label AS section,
             COUNT(*) FILTER (WHERE cf.status = 'VIOLATED') AS violated,
             COUNT(*) FILTER (WHERE cf.status = 'FOLLOWED') AS followed,
             ROUND(
               COUNT(*) FILTER (WHERE cf.status = 'FOLLOWED') * 100.0 /
               NULLIF(COUNT(*) FILTER (WHERE cf.status IN ('FOLLOWED', 'VIOLATED')), 0),
             1) AS compliance_pct
      FROM analytics_criterion_facts cf
      WHERE cf.app_id = :app_id AND cf.tenant_id = :tenant_id
      GROUP BY cf.criterion_id, cf.criterion_label
      ORDER BY violated DESC

  - intent: "Pass rate trend over time"
    sql: |
      SELECT rf.run_id::text,
             rf.run_name AS run_name,
             rf.created_at::date AS date,
             rf.thread_count AS threads,
             rf.pass_rate
      FROM analytics_run_facts rf
      WHERE rf.app_id = :app_id AND rf.tenant_id = :tenant_id
        AND rf.status IN ('completed', 'completed_with_errors')
      ORDER BY rf.created_at DESC

  - intent: "Worst performing threads"
    sql: |
      SELECT ef.item_id AS thread_id,
             MAX(CASE WHEN ef.evaluator_type = 'correctness' THEN ef.result_status END) AS correctness,
             MAX(CASE WHEN ef.evaluator_type = 'efficiency' THEN ef.result_status END) AS efficiency,
             MAX(CASE WHEN ef.evaluator_type = 'intent' THEN ef.result_score END) AS intent_accuracy,
             ef.created_at::date AS date
      FROM analytics_eval_facts ef
      WHERE ef.app_id = :app_id AND ef.tenant_id = :tenant_id
      GROUP BY ef.item_id, ef.created_at::date
      HAVING MAX(CASE WHEN ef.evaluator_type = 'correctness' THEN ef.result_status END) != 'PASS'
      ORDER BY
        CASE MAX(CASE WHEN ef.evaluator_type = 'correctness' THEN ef.result_status END)
          WHEN 'CRITICAL' THEN 1
          WHEN 'HARD FAIL' THEN 2
          WHEN 'SOFT FAIL' THEN 3
          ELSE 4
        END
      LIMIT 20

  - intent: "Adversarial test results summary"
    sql: |
      SELECT ef.context->>'difficulty' AS difficulty,
             COUNT(*) AS total,
             COUNT(*) FILTER (WHERE ef.success) AS blocked,
             COUNT(*) FILTER (WHERE NOT ef.success) AS breached,
             ROUND(COUNT(*) FILTER (WHERE ef.success) * 100.0 / NULLIF(COUNT(*), 0), 1) AS block_rate
      FROM analytics_eval_facts ef
      WHERE ef.app_id = :app_id AND ef.tenant_id = :tenant_id
        AND ef.evaluator_type = 'adversarial_judge'
      GROUP BY ef.context->>'difficulty'
      ORDER BY block_rate ASC
