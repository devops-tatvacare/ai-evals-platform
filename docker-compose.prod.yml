# Production Docker Compose
# ─────────────────────────────────────────────────────────────────────────────
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - ACR images already pushed (GitHub Actions does this on tag push)
#   - All environment variables below set in Azure App Service Configuration
#     or in a .env.prod file (NEVER commit .env.prod to git)
#
# Variables consumed from environment / App Service config:
#   ACR_LOGIN_SERVER   e.g. myacr.azurecr.io
#   IMAGE_TAG          git tag, e.g. v1.2.0  (defaults to "latest")
# ─────────────────────────────────────────────────────────────────────────────

x-backend-runtime: &backend-runtime
  image: ${ACR_LOGIN_SERVER}/evals-backend:${IMAGE_TAG:-latest}
  restart: unless-stopped
  environment:
    # ── Database ─────────────────────────────────────────────────────────────
    DATABASE_URL: ${DATABASE_URL}

    # ── File storage ─────────────────────────────────────────────────────────
    FILE_STORAGE_TYPE: ${FILE_STORAGE_TYPE:-azure_blob}
    FILE_STORAGE_PATH: ${FILE_STORAGE_PATH:-/app/uploads}
    AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
    AZURE_STORAGE_CONTAINER: ${AZURE_STORAGE_CONTAINER:-evals-files}
    MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-100}
    ALLOWED_UPLOAD_MIMES: ${ALLOWED_UPLOAD_MIMES:-audio/wav,audio/mpeg,audio/mp3,audio/webm,audio/x-wav,audio/x-m4a,audio/m4a,audio/mp4,audio/ogg,text/csv,text/plain,application/json,application/octet-stream}

    # ── API and auth ─────────────────────────────────────────────────────────
    API_PORT: ${API_PORT:-8721}
    CORS_ORIGINS: ${CORS_ORIGINS}
    APP_BASE_URL: ${APP_BASE_URL}
    PDF_RENDER_BASE_URL: ${PDF_RENDER_BASE_URL:-}
    JWT_SECRET: ${JWT_SECRET}
    JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
    JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
    JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
    ADMIN_EMAIL: ${ADMIN_EMAIL:-}
    ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    ADMIN_TENANT_NAME: ${ADMIN_TENANT_NAME:-}
    ADMIN_TENANT_ALLOWED_DOMAINS: ${ADMIN_TENANT_ALLOWED_DOMAINS:-}
    AUTH_RATE_LIMIT: ${AUTH_RATE_LIMIT:-10/minute}

    # ── Gemini / Vertex AI service account (system-tenant-only fallback) ─────
    # All other tenant LLM credentials live in platform.tenant_llm_providers,
    # configured per-tenant via Admin → AI Settings. No tenant LLM env vars.
    GEMINI_SERVICE_ACCOUNT_JSON: ${GEMINI_SERVICE_ACCOUNT_JSON:-}

    # ── LLM credential encryption key ────────────────────────────────────────
    # Required: encrypts api_key_encrypted blobs in tenant_llm_providers.
    # Generate with `python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"`.
    LLM_CREDENTIAL_KEY: ${LLM_CREDENTIAL_KEY:-}

    # ── Kaira adversarial testing ────────────────────────────────────────────
    KAIRA_API_URL: ${KAIRA_API_URL:-}
    KAIRA_AUTH_TOKEN: ${KAIRA_AUTH_TOKEN:-}
    KAIRA_TEST_USER_ID: ${KAIRA_TEST_USER_ID:-}
    ADVERSARIAL_MAX_TURNS: ${ADVERSARIAL_MAX_TURNS:-10}
    ADVERSARIAL_TURN_DELAY: ${ADVERSARIAL_TURN_DELAY:-1.5}
    ADVERSARIAL_CASE_DELAY: ${ADVERSARIAL_CASE_DELAY:-3.0}

    # ── LeadSquared (Inside Sales) ───────────────────────────────────────────
    LSQ_BASE_URL: ${LSQ_BASE_URL:-}
    LSQ_ACCESS_KEY: ${LSQ_ACCESS_KEY:-}
    LSQ_SECRET_KEY: ${LSQ_SECRET_KEY:-}

    # ── Job worker controls ──────────────────────────────────────────────────
    JOB_MAX_CONCURRENT: ${JOB_MAX_CONCURRENT:-3}
    JOB_POLL_INTERVAL_SECONDS: ${JOB_POLL_INTERVAL_SECONDS:-1.0}
    JOB_HEARTBEAT_INTERVAL_SECONDS: ${JOB_HEARTBEAT_INTERVAL_SECONDS:-15.0}
    JOB_LEASE_SECONDS: ${JOB_LEASE_SECONDS:-60}
    JOB_STALE_TIMEOUT_MINUTES: ${JOB_STALE_TIMEOUT_MINUTES:-15}
    JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-3}
    JOB_RETRY_BASE_DELAY_SECONDS: ${JOB_RETRY_BASE_DELAY_SECONDS:-5}
    JOB_RETRY_MAX_DELAY_SECONDS: ${JOB_RETRY_MAX_DELAY_SECONDS:-60}
    JOB_TENANT_MAX_CONCURRENT: ${JOB_TENANT_MAX_CONCURRENT:-2}
    JOB_APP_MAX_CONCURRENT: ${JOB_APP_MAX_CONCURRENT:-2}
    JOB_USER_MAX_CONCURRENT: ${JOB_USER_MAX_CONCURRENT:-2}
    JOB_INTERACTIVE_MAX_CONCURRENT: ${JOB_INTERACTIVE_MAX_CONCURRENT:-0}
    JOB_STANDARD_MAX_CONCURRENT: ${JOB_STANDARD_MAX_CONCURRENT:-0}
    JOB_BULK_MAX_CONCURRENT: ${JOB_BULK_MAX_CONCURRENT:-2}
    JOB_CLAIM_WINDOW_MULTIPLIER: ${JOB_CLAIM_WINDOW_MULTIPLIER:-10}
    JOB_CLAIM_WINDOW_MAX: ${JOB_CLAIM_WINDOW_MAX:-100}
    JOB_RUN_EMBEDDED_WORKER: "false"

services:
  backend:
    <<: *backend-runtime
    container_name: evals-backend
    ports:
      - "8721:8721"

  worker:
    <<: *backend-runtime
    container_name: evals-worker
    command: ["python", "-m", "app.worker"]

  frontend:
    image: ${ACR_LOGIN_SERVER}/evals-frontend:${IMAGE_TAG:-latest}
    container_name: evals-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

# No postgres service — use Azure Database for PostgreSQL (Flexible Server)
# No volumes for source code — code is baked into the images at build time
