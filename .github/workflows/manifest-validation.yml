name: manifest-validation

on:
  pull_request:
    paths:
      - 'backend/app/services/chat_engine/manifest.py'
      - 'backend/app/services/chat_engine/manifest_validator.py'
      - 'backend/app/services/chat_engine/manifests/**'
      - 'backend/app/services/chat_engine/tool_description_generator.py'
      - 'backend/app/services/chat_engine/prompt_generator.py'
      - 'backend/app/services/chat_engine/comment_emitter.py'
      - 'backend/app/services/chat_engine/data_surfaces.py'
      - 'backend/app/services/chat_engine/catalog_tools.py'
      - 'backend/app/services/chat_engine/sql_agent.py'
      - 'backend/app/services/report_builder/tool_definitions.py'
      - 'backend/app/services/report_builder/chat_handler.py'
      - 'backend/app/startup_schema.py'
      - 'backend/tests/test_manifest_*.py'
      - 'backend/tests/test_catalog_tools_manifest.py'
      - 'backend/tests/test_tool_description_generator.py'
      - 'backend/tests/test_prompt_generator.py'
      - 'backend/tests/test_comment_emitter.py'
      - 'backend/tests/test_sql_agent_manifest_precheck.py'
      - '.github/workflows/manifest-validation.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: evals_user
          POSTGRES_PASSWORD: evals_pass
          POSTGRES_DB: ai_evals_platform
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://evals_user:evals_pass@localhost:5433/ai_evals_platform
      TEST_DATABASE_URL: postgresql+asyncpg://evals_user:evals_pass@localhost:5433/ai_evals_platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio
      - name: Bootstrap DB schema
        run: |
          cd backend
          PYTHONPATH=. python -c "import asyncio; from app.startup_schema import bootstrap_database_schema; asyncio.run(bootstrap_database_schema())"
      - name: Run manifest tests
        run: |
          cd backend
          PYTHONPATH=. pytest \
            tests/test_manifest_loader.py \
            tests/test_manifest_validator.py \
            tests/test_catalog_tools_manifest.py \
            tests/test_tool_description_generator.py \
            tests/test_prompt_generator.py \
            tests/test_comment_emitter.py \
            tests/test_sql_agent_manifest_precheck.py \
            -v
